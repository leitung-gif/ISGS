  <circle cx="109" cy="102" r="2.3" fill="#e8d08a" opacity="0.75"/>
  <circle cx="105" cy="108" r="2.4" fill="#e8d08a" opacity="0.7"/>
  <circle cx="97" cy="109" r="2.2" fill="#e8d08a" opacity="0.8"/>
  <circle cx="92" cy="104" r="2.3" fill="#e8d08a" opacity="0.75"/>
  <circle cx="91" cy="97" r="2.4" fill="#e8d08a" opacity="0.7"/>
  <circle cx="95" cy="92" r="2.1" fill="#e8d08a" opacity="0.8"/>
  <circle cx="100" cy="100" r="3" fill="#f0dfa0" opacity="0.5"/>
