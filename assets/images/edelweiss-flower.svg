    <ellipse cx="100" cy="50" rx="14" ry="40" fill="url(#petalG)" stroke="#c9bfad" stroke-width="0.6" transform="rotate(154.3 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="40" fill="url(#petalG)" stroke="#c9bfad" stroke-width="0.6" transform="rotate(205.7 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="40" fill="url(#petalG)" stroke="#c9bfad" stroke-width="0.6" transform="rotate(257.1 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="40" fill="url(#petalG)" stroke="#c9bfad" stroke-width="0.6" transform="rotate(308.6 100 100)"/>
  </g>
  <!-- Inner petals — 7 smaller, offset rotation -->
  <g opacity="0.88">
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(25.7 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(77.1 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(128.6 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(231.4 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(282.8 100 100)"/>
    <ellipse cx="100" cy="60" rx="10" ry="30" fill="url(#petalG2)" stroke="#d4cabb" stroke-width="0.4" transform="rotate(334.3 100 100)"/>
  </g>
  <!-- Petal vein lines — subtle texture -->
  <g opacity="0.15" stroke="#a89880" stroke-width="0.3" fill="none">
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(0 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(51.4 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(102.8 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(154.3 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(205.7 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(257.1 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="60" transform="rotate(308.6 100 100)"/>
  </g>
  <!-- Center — golden with detailed dots -->
  <circle cx="100" cy="100" r="16" fill="url(#centerG)"/>
  <circle cx="100" cy="100" r="12" fill="#d4b55a" opacity="0.6"/>
