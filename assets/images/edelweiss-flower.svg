<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="petalG" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="60%" stop-color="#ede6da"/>
      <stop offset="100%" stop-color="#ddd5c6"/>
    </radialGradient>
    <radialGradient id="petalG2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f0ebe2"/>
      <stop offset="100%" stop-color="#d8d0c0"/>
    </radialGradient>
    <radialGradient id="centerG" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e5cc80"/>
      <stop offset="50%" stop-color="#d4b55a"/>
      <stop offset="100%" stop-color="#b89838"/>
